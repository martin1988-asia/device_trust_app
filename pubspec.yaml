name: device_trust_app
description: "Device Trust - Live tracking & marketplace app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ✅ Core utilities
  shared_preferences: ^2.5.5
  http: ^1.2.1
  url_launcher: ^6.3.2

  # ✅ Media & files
  image_picker: ^1.1.2
  file_picker: ^10.3.10

  # ✅ Location & maps
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # ✅ Background tracking
  flutter_background_service: ^5.1.0

  # ✅ Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_database: ^11.3.10

  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ✅ ✅ ✅ ASSETS (CRITICAL FIX ✅)
  assets:
    - assets/images/
