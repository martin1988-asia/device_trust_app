<!DOCTYPE html>
<html>
<head>

  <!-- ✅ BASE -->
  <base href="/device_trust_app/">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="description" content="Device Trust App">

  <!-- ✅ ICONS -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Device Trust</title>
  <link rel="manifest" href="manifest.json">

  <!-- ✅ GOOGLE MAPS -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDloe8nxKKFyjIC1FJbORMxr9VDgLqBKPk"></script>

  <!-- ✅ STYLE -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0B1220;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;

      /* ✅ enable 3D perspective */
      perspective: 1000px;
    }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }

    .center-stack {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ✅ BIG RINGS */
    .ring {
      position: absolute;
      width: 90vw;
      height: 90vw;
      max-width: 800px;
      max-height: 800px;
      border-radius: 50%;
      border: 4px solid rgba(56,189,248,0.2);
      animation: spin 12s linear infinite;
    }

    .ring-inner {
      position: absolute;
      width: 70vw;
      height: 70vw;
      max-width: 600px;
      max-height: 600px;
      border-radius: 50%;
      border: 3px solid rgba(168,85,247,0.15);
      animation: spinReverse 12s linear infinite;
    }

    /* ✅ CALM STATIC GLOW (NO PULSE ✅) */
    .glow {
      position: absolute;
      width: 75vw;
      height: 75vw;
      max-width: 650px;
      max-height: 650px;
      border-radius: 50%;
      background: rgba(59,130,246,0.05);
    }

    /* ✅ 3D CONTAINER */
    .logo-wrapper {
      width: 50vw;
      height: 50vw;
      max-width: 500px;
      max-height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);

      display: flex;
      justify-content: center;
      align-items: center;

      z-index: 2;

      /* ✅ 3D rotation */
      transform-style: preserve-3d;
      animation: rotate3D 18s linear infinite;
    }

    .logo-wrapper img {
      width: 85%;
      height: 85%;
      object-fit: contain;
    }

    .title {
      color: white;
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 3px;
    }

    /* ✅ BACKGROUND ROTATION */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    /* ✅ 🎬 3D ANIMATION */
    @keyframes rotate3D {
      0%   { transform: rotateY(0deg) rotateX(5deg); }
      25%  { transform: rotateY(90deg) rotateX(8deg); }
      50%  { transform: rotateY(180deg) rotateX(5deg); }
      75%  { transform: rotateY(270deg) rotateX(8deg); }
      100% { transform: rotateY(360deg) rotateX(5deg); }
    }
  </style>

</head>

<body>

  <div class="loader" id="loader">

    <div class="center-stack">
      <div class="ring"></div>
      <div class="ring-inner"></div>
      <div class="glow"></div>

      <!-- ✅ LOGO -->
      <div class="logo-wrapper">
        <img src="assets/images/device_trust_logo.png" />
      </div>
    </div>

    <div class="title">Device Trust</div>

  </div>

  <!-- ✅ FLUTTER -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- ✅ HANDOFF -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loader');
      if (loader) {
        loader.style.transition = 'opacity 0.6s ease';
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 600);
      }
    });
  </script>

</body>
</html>
